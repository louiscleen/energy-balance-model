# ============================================================
# Default configuration for the 1D Budyko Energy Balance Model
# ============================================================


# ------------------------------------------------------------
# Model configuration
# ------------------------------------------------------------
[model]

# Number of latitude bands
n_lat = 18


# ------------------------------------------------------------
# Time integration
# ------------------------------------------------------------
[time]

# Time step of the model
dt = 1.0          # [days]

# Total simulation length
n_years = 500


# ------------------------------------------------------------
# Surface heat capacity
# ------------------------------------------------------------
[heat_capacity]

# Effective heat capacity of the surface layer
C_value = 2.0e8                       # [J m^-2 K^-1]


# ------------------------------------------------------------
# Albedo reference values
# ------------------------------------------------------------
[albedo]

# Atmospheric albedo (Rayleigh scattering)
alpha_atmosphere = 0.06         # [-]

# Albedo of clouds
alpha_cloud = 0.4081            # [-] adjusted

# Albedo of land surfaces
alpha_land = 0.15               # [-]

# Albedo of ocean surfaces
alpha_ocean = 0.08              # [-]

# Albedo of snow surfaces
alpha_snow = 0.7               # [-]

# Albedo of ice surfaces
alpha_ice = 0.7                 # [-]

# Temperature thresholds for ice formation and melting
T_ice_min = 257.0            # [K]
T_ice_max = 270.0            # [K]

# Temperature thresholds for snow formation and melting
T_snow_min = 263.0           # [K]
T_snow_max = 283.0           # [K]


# ------------------------------------------------------------
# Insolation parameters
# ------------------------------------------------------------
[insolation]

# Solar constant
S = 1361.0                     # [W m^-2]

# If true, include seasonal cycle in insolation
seasonal = true

# ------------------------------------------------------------
# Outgoing IR flux parameters
# ------------------------------------------------------------
[radiation]

# Atmospheric CO2 concentration
p_CO2 = 280.0                # [ppm]

A1 = 243.39                  # [W m^-2]
A2 = -4.48                   # [W m^-2]
B1 = 2.07                    # [W m^-2 K^-1]
B2 = -0.0514                 # [W m^-2 K^-1]
C = 54.13                    # [W m^-2]
D = 0.58                     # [W m^-2 K^-1]


# ------------------------------------------------------------
# Meridional heat transport parameters
# ------------------------------------------------------------
[transport]

# Meridional heat diffusion coefficient (independent of latitude in Budyko's approach)
K_meridional = 3.057            # [W m^-2 K^-1] adjusted


# ------------------------------------------------------------
# Input configuration
# ------------------------------------------------------------
[data]

# Dataset used for latitude-dependent input fields
# The file must use the '\t' separator and contain the following column headers:
#   - 'f_land'  : Land fraction (range 0.0 to 1.0)
#   - 'f_cloud' : Cloud cover fraction (range 0.0 to 1.0)
#   - 'T0'      : Initial temperature [K]
dataset = "earth_18lat.csv"


# ------------------------------------------------------------
# Output configuration
# ------------------------------------------------------------
[output]

# Frequency of output (in model time steps)
save_every = 10

# Output directory
output_dir = "output/"